name: 종목코드 목록 갱신 (한국·미국)

# 상장종목 코드 목록(data/kr-stocks.json · data/us-stocks.json)을 갱신한다.
# on-demand.html 의 '한국/미국 종목 코드 찾기'가 이 파일들을 받아 로컬 검색한다.
# 종목 목록은 자주 안 바뀌므로 필요할 때 수동 실행(또는 분기 스케줄)만 한다.
# GitHub 러너는 KRX·미국 데이터에 접근 가능 — 로컬 샌드박스가 막혀 있어도 여기선 받아진다.

on:
  workflow_dispatch:
  # 필요 시 분기 1회 자동 갱신을 켜려면 아래 주석 해제:
  # schedule:
  #   - cron: '0 0 1 1,4,7,10 *'

jobs:
  update-stocks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치 (FinanceDataReader)
        run: pip install -U finance-datareader

      - name: 한국(KRX) 종목 목록 다운로드
        run: python3 scripts/build_kr_stocks.py

      - name: 미국(NASDAQ·NYSE·AMEX) 종목 목록 다운로드
        run: python3 scripts/build_us_stocks.py

      - name: 변경 시 커밋·푸시
        run: |
          if git diff --quiet -- data/kr-stocks.json data/us-stocks.json; then
            echo "변경 없음 — 커밋 생략"
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/kr-stocks.json data/us-stocks.json
            git commit -m "chore: 종목코드 목록 갱신 (한국·미국)"
            git push
          fi
